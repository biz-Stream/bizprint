name: バグ報告
description: バグや不具合を報告する
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告にご協力いただきありがとうございます。
        以下の項目をできるだけ詳しくご記入ください。

  - type: textarea
    id: description
    attributes:
      label: バグの概要
      description: どのような不具合が発生しましたか？
      placeholder: 具体的に記述してください
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現するための手順を記述してください。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どのように動作すべきですか？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際にはどのように動作しましたか？
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: 対象モジュール
      description: 該当するモジュールを選択してください。
      options:
        - bizprint-server-java
        - bizprint-server-csharp
        - bizprint-client
        - その他
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境情報
      description: OS、Java/JDK バージョン、.NET Framework バージョンなど。
      placeholder: |
        - OS: Windows 11
        - JDK: 8u402
        - .NET Framework: 4.6
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: ログ、スクリーンショットなど、参考になる情報があれば添付してください。
    validations:
      required: false
